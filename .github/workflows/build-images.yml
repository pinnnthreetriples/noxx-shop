name: Build images

# After CI goes green on main: build all five images on GitHub runners and
# push to ghcr.io — the prod laptop only pulls ready images (no local builds).
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io/pinnnthreetriples
  # baked into the frontend bundles at build time (public values, not secrets)
  BACKEND_PUBLIC_URL: https://api.noxxshop.com
  BOT_USERNAME: noxx_video_bot

jobs:
  build-push:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push all images
        run: |
          docker build -t "$REGISTRY/noxx-backend:latest" apps/backend
          docker build -t "$REGISTRY/noxx-media-server:latest" -f apps/backend/Dockerfile.media apps/backend
          docker build -t "$REGISTRY/noxx-bot:latest" apps/bot
          docker build -t "$REGISTRY/noxx-admin:latest" --build-arg "VITE_API_BASE_URL=$BACKEND_PUBLIC_URL" apps/admin
          docker build -t "$REGISTRY/noxx-miniapp:latest" --build-arg "VITE_TELEGRAM_BOT_USERNAME=$BOT_USERNAME" apps/miniapp
          for img in backend media-server bot admin miniapp; do
            docker push "$REGISTRY/noxx-$img:latest"
          done
