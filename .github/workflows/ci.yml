name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  aislop:
    name: aislop (AI-slop gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npx --yes aislop@latest ci

  backend:
    name: backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: apps/backend/requirements.txt
      - run: pip install -r requirements.txt ruff pytest pytest-asyncio aiosqlite
      - run: ruff check .
      - run: ruff check --config ruff.toml ../bot
      - run: python -m pytest -q

  miniapp:
    name: miniapp (tsc + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/miniapp
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/miniapp/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  admin:
    name: admin (tsc + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/admin/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  actionlint:
    name: actionlint (workflow lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: raven-actions/actionlint@v2

  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
