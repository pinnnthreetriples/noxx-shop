# Production miniapp: static SPA + same-origin proxies.
# The Telegram iframe blocks cross-origin fetch, so the app talks only to its
# own origin: /api -> backend, /media -> media-server (prefixes stripped).
server {
    listen 80;
    client_max_body_size 10m;

    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /media/ {
        proxy_pass http://media-server:9000/;
        proxy_set_header Host $host;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
