lint.select = [
  "E4", "E7", "E9", # pycodestyle errors
  "F",              # pyflakes (unused imports, undefined names)
  "B",              # bugbear (likely bugs)
  "S",              # bandit security rules
  "C901",           # mccabe cyclomatic complexity
]
# B008: `Depends(...)` in argument defaults is the core FastAPI idiom
lint.ignore = ["B008"]

lint.mccabe.max-complexity = 10

[lint.per-file-ignores]
# SQLAlchemy string forward-references in Mapped["..."] are resolved at runtime
"**/models.py" = ["F821"]
# assert is the pytest assertion mechanism
"tests/*" = ["S101"]
