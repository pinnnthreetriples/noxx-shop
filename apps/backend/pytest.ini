[pytest]
testpaths = tests
asyncio_mode = auto
pythonpath = .
; strict mode:
;   filterwarnings=error  — any warning fails the suite
;   --strict-markers      — an unknown @pytest.mark.* fails instead of warning
;   --strict-config       — any pytest.ini parse issue fails instead of warning
;   xfail_strict          — an xfail that unexpectedly passes fails
;   -ra                   — report reasons for all non-passing outcomes
addopts = --strict-markers --strict-config -ra
xfail_strict = true
filterwarnings = error
